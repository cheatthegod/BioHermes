# BioHermes CLI config preset
#
# Copy to ~/.hermes/config.yaml (or keep as a local override and load with
# HERMES_CLI_CONFIG=...).  Fills in:
#   - OpenRouter + claude-opus-4.6 as the default model
#   - Tier B — smart_model_routing / approvals / checkpoints (plan v10 §9.2)
#   - mcp_bioclaw stdio server for send_image / send_file
#   - skill + memory nudges aligned with the BioHermes self-improvement stack
#
# Prerequisites:
#   1. `pip install -e .[all]` (or your chosen extras) from the BioHermes repo root
#   2. Put provider credentials in the PROFILE's .env — i.e.
#      `<repo>/.biohermes-profile/.env`, not `~/.hermes/.env`.  The wrapper
#      points HERMES_HOME at `.biohermes-profile/`, and Hermes's env loader
#      only reads `$HERMES_HOME/.env` (see hermes_cli/env_loader.py).  The
#      profile dir is created by the wrapper on first launch.
#   3. The `<path-to-biohermes-checkout>` placeholders in the file are
#      substituted by `biohermes/bin/biohermes` at first launch — no
#      manual edit needed.

model:
  default: "anthropic/claude-opus-4.6"
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"

agent:
  max_turns: 60
  verbose: false
  reasoning_effort: "medium"

terminal:
  backend: "local"
  cwd: "."
  timeout: 180

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6

skills:
  creation_nudge_interval: 15
  # Register BioHermes's bundled bio skills as an external dir.  cli.py
  # only emits this line when the dir actually exists, which is the case
  # for `pip install -e .` (editable) runs.  Non-editable installs rely
  # on Hermes's auto-bundle of anything under `optional-skills/` at the
  # fork root; `<biohermes-skills-dir>` is stripped in that case.
  external_dirs:
    - <biohermes-skills-dir>

display:
  # compact: true — shrinks Hermes's own welcome banner to a tiny status
  # line.  Combined with our pre-launch splash (biohermes/splash.py),
  # this means the user mostly sees the BioHermes-branded splash and
  # only a minimal Hermes status row underneath.
  compact: true
  tool_progress: all
  streaming: true
  # BioHermes-themed skin — installed by `biohermes/cli.py` to
  # <HERMES_HOME>/skins/biohermes.yaml on first launch.  Sets bio
  # color palette + DNA spinner + 🧬 BioHermes branding inside chat.
  skin: biohermes

# Tier B (plan v10 §9.2)
smart_model_routing:
  enabled: true
  max_simple_chars: 160
  max_simple_words: 28
  cheap_model:
    provider: openrouter
    model: google/gemini-2.5-flash

approvals:
  mode: smart
  timeout: 60

checkpoints:
  enabled: true
  max_snapshots: 50

# BioHermes-specific external MCP shim — implements send_image / send_file
# as a replacement for the BioClaw agent-runner IPC tools.
#
# `biohermes/bin/biohermes` (bash) and `biohermes.cli` (Python console
# script) substitute these placeholders at first launch:
#   <biohermes-mcp-shim>  — absolute path to mcp_bioclaw_server.py (works
#                           in both editable and non-editable installs)
#   <biohermes-outbox>    — absolute path to the profile's outbox dir
mcp_servers:
  bioclaw:
    command: python3
    args:
      - <biohermes-mcp-shim>
    env:
      # Profile-scoped outbox.  Templated to sit inside HERMES_HOME so
      # bio outputs never pollute the user's real ~/.hermes/.
      BIOCLAW_OUTBOX: <biohermes-outbox>

      # Gateway-awareness pass-through.  The shim reads these to decide
      # whether to emit "GATEWAY ACTIVE: use send_message ..." guidance or
      # treat the outbox copy as the final delivery.  The values are
      # substituted from the agent process's env (Hermes gateway sets
      # them when a home channel is configured: gateway/run.py:5756).
      # Leaving these unset is safe — the shim just falls back to the
      # CLI / outbox behaviour.
      TELEGRAM_HOME_CHANNEL: ${TELEGRAM_HOME_CHANNEL}
      DISCORD_HOME_CHANNEL: ${DISCORD_HOME_CHANNEL}
      SLACK_HOME_CHANNEL: ${SLACK_HOME_CHANNEL}
      WHATSAPP_HOME_CHANNEL: ${WHATSAPP_HOME_CHANNEL}
      SIGNAL_HOME_CHANNEL: ${SIGNAL_HOME_CHANNEL}
      MATRIX_HOME_CHANNEL: ${MATRIX_HOME_CHANNEL}
      WEIXIN_HOME_CHANNEL: ${WEIXIN_HOME_CHANNEL}
      FEISHU_HOME_CHANNEL: ${FEISHU_HOME_CHANNEL}
      DINGTALK_HOME_CHANNEL: ${DINGTALK_HOME_CHANNEL}
      QQBOT_HOME_CHANNEL: ${QQBOT_HOME_CHANNEL}
      MATTERMOST_HOME_CHANNEL: ${MATTERMOST_HOME_CHANNEL}
      BLUEBUBBLES_HOME_CHANNEL: ${BLUEBUBBLES_HOME_CHANNEL}
      WECOM_HOME_CHANNEL: ${WECOM_HOME_CHANNEL}
      EMAIL_HOME_CHANNEL: ${EMAIL_HOME_CHANNEL}
    timeout: 30
    connect_timeout: 15
