# BioHermes CLI config preset
#
# Copy to ~/.hermes/config.yaml (or keep as a local override and load with
# HERMES_CLI_CONFIG=...).  Fills in:
#   - OpenRouter + claude-opus-4.6 as the default model
#   - Tier B — smart_model_routing / approvals / checkpoints (plan v10 §9.2)
#   - mcp_bioclaw stdio server for send_image / send_file
#   - skill + memory nudges aligned with the BioHermes self-improvement stack
#
# Prerequisites:
#   1. `pip install -e .[all]` (or your chosen extras) from the BioHermes repo root
#   2. `OPENROUTER_API_KEY` in ~/.hermes/.env  (or switch provider below)
#   3. The `mcp_bioclaw_server.py` path in `mcp_servers.bioclaw.args` points at
#      your BioHermes checkout — edit if your clone lives elsewhere.

model:
  default: "anthropic/claude-opus-4.6"
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"

agent:
  max_turns: 60
  verbose: false
  reasoning_effort: "medium"

terminal:
  backend: "local"
  cwd: "."
  timeout: 180

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6

skills:
  creation_nudge_interval: 15

display:
  compact: false
  tool_progress: all
  streaming: true

# Tier B (plan v10 §9.2)
smart_model_routing:
  enabled: true
  max_simple_chars: 160
  max_simple_words: 28
  cheap_model:
    provider: openrouter
    model: google/gemini-2.5-flash

approvals:
  mode: smart
  timeout: 60

checkpoints:
  enabled: true
  max_snapshots: 50

# BioHermes-specific external MCP shim — implements send_image / send_file
# as a replacement for the BioClaw agent-runner IPC tools.  Replace the
# `<path>` below with your checkout path (or set BIOHERMES_REPO env var and
# template the config at generation time).
mcp_servers:
  bioclaw:
    command: python3
    args:
      - <path-to-biohermes-checkout>/biohermes/mcp_bioclaw_server.py
    env:
      # Required for the shim to resolve the outbox.  Typically ~/.hermes
      # (the default HERMES_HOME) is fine; override for per-project outbox.
      BIOCLAW_OUTBOX: ${HOME}/.hermes/outbox
    timeout: 30
    connect_timeout: 15
